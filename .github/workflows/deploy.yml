name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT || 22 }}
          script: |
            # Navigate to project directory
            cd /var/www/skillpal

            # Pull latest code
            git pull origin main

            # --- Backend Deployment ---
            echo "Deploying Backend..."
            cd backend
            npm install
            npx prisma generate
            npm run build
            pm2 restart all

            # --- Frontend Deployment ---
            echo "Deploying Frontend..."
            cd ../frontend
            npm install
            # Remove root lockfile — Turbopack picks wrong workspace root when two lockfiles exist
            rm -f /var/www/skillpal/package-lock.json
            # Clear stale Turbopack/webpack cache to prevent build panics
            rm -rf .next
            npm run build
            pm2 restart all

            echo "Deployment Complete!"
