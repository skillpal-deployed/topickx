name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd /var/www/skillpal/topickx
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "=== Installing backend dependencies ==="
            cd /var/www/skillpal/topickx/backend
            npm ci
            npm run build

            echo "=== Running DB migrations ==="
            cd /var/www/skillpal/topickx/backend
            if [ -d "prisma/migrations" ] && [ "$(ls -A prisma/migrations)" ]; then
              npx prisma migrate deploy
            else
              echo "No migrations found, generating Prisma client only..."
              npx prisma generate
            fi

            echo "=== Installing frontend dependencies ==="
            cd /var/www/skillpal/topickx/frontend
            npm ci

            echo "=== Building frontend ==="
            NODE_ENV=production npm run build

            echo "=== Restarting services ==="
            pm2 restart skillpal-backend
            pm2 restart skillpal-frontend
            pm2 save

            echo "=== Deploy complete ==="
