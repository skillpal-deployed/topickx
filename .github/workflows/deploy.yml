name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build frontend on GitHub Actions runner (clean env, 7 GB RAM) ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: npm run build

      # ── Upload built .next to server ──
      - name: Copy .next build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT || 22 }}
          source: "frontend/.next"
          target: "/var/www/skillpal"
          # NOTE: do NOT set rm: true — it deletes the entire target dir (including git repo + backend)

      # ── Pull code + build backend + restart ──
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT || 22 }}
          script: |
            cd /var/www/skillpal
            git pull origin main

            # Backend
            echo "Deploying Backend..."
            cd backend
            npm ci
            npx prisma generate
            npm run build

            # Frontend: install deps only (.next already uploaded by SCP)
            echo "Installing frontend deps..."
            cd ../frontend
            npm ci

            pm2 restart all
            echo "Deployment Complete!"
