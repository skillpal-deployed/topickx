name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  # ─── Step 1: Build frontend on GitHub Actions runner (clean env, 7 GB RAM) ───
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 1

  # ─── Step 2: Deploy backend + upload built frontend to server ───
  deploy:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: .next

      - name: Copy built frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT || 22 }}
          source: ".next"
          target: "/var/www/skillpal/frontend"
          rm: true

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT || 22 }}
          script: |
            cd /var/www/skillpal
            git pull origin main

            # --- Backend ---
            echo "Deploying Backend..."
            cd backend
            npm ci
            npx prisma generate
            npm run build

            # --- Frontend: deps only (build already uploaded) ---
            echo "Deploying Frontend..."
            cd ../frontend
            npm ci

            pm2 restart all
            echo "Deployment Complete!"
